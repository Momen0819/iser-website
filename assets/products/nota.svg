<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="نوتة">
  <defs>
    <linearGradient id="notaBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10B981" />
      <stop offset="1" stop-color="#047857" />
    </linearGradient>
  </defs>
  <!-- App tile -->
  <rect width="64" height="64" rx="16" fill="url(#notaBg)" />
  <!-- Ledger page (the "notebook" / النوتة) -->
  <rect x="15" y="12" width="30" height="40" rx="5" fill="#FFFFFF" />
  <!-- Ledger lines -->
  <rect x="21" y="21" width="18" height="3" rx="1.5" fill="#CBD5E1" />
  <rect x="21" y="29" width="18" height="3" rx="1.5" fill="#CBD5E1" />
  <rect x="21" y="37" width="11" height="3" rx="1.5" fill="#CBD5E1" />
  <!-- Amber "settled" coin with check -->
  <circle cx="45" cy="44" r="11" fill="#F59E0B" stroke="#FFFFFF" stroke-width="3" />
  <path d="M40 44.2 L43.4 47.6 L50 40.5" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
</svg>
